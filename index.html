<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liliana's Catering Calculator</title>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f4f4f4; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 600px; width: 100%; border-top: 10px solid #a61e22; }
        h1 { color: #a61e22; text-align: center; }
        .section { margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        label { font-weight: bold; display: block; margin-bottom: 8px; }
        input, select { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; margin-bottom: 10px; }
        .option-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; font-size: 14px; }
        .option-row input { width: auto; margin: 0; }
        button { width: 100%; background: #2e7d32; color: white; border: none; padding: 15px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .quote-box { display: none; margin-top: 25px; padding: 20px; background: #fff8f8; border: 2px solid #a61e22; border-radius: 10px; }
        .total { font-size: 28px; color: #a61e22; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h1>Liliana's Catering Assistant</h1>
    
    <div class="section">
        <label>1. Order Type</label>
        <select id="orderType" onchange="toggleTenderloin()">
            <option value="bundle1">Bundle 1: Pizza OR Sandwich ($15/pp)</option>
            <option value="bundle2">Bundle 2: Pizza AND Sandwich ($18/pp)</option>
            <option value="bundle3">Bundle 3: Pizza, Sandwich, Pasta ($21/pp)</option>
            <option value="box">Box Lunch ($15.00/each)</option>
        </select>
    </div>

    <div class="section">
        <label>2. Number of People (Min 10)</label>
        <input type="number" id="guestCount" value="10" min="10">
    </div>

    <div class="section">
        <label>3. Add-Ons</label>
        <div class="option-row" id="tenderloinRow" style="display:none;">
            <input type="checkbox" id="tenderloin"> 
            <span>Upgrade to Famous Beef Tenderloin (+$3.00/pp)</span>
        </div>
        <div class="option-row">
            <input type="checkbox" id="cannolis"> 
            <span>Add 2 Cannolis (+$2.50/pp)</span>
        </div>
    </div>

    <button onclick="getQuote()">Generate Instant Quote</button>

    <div id="quoteBox" class="quote-box">
        <p id="breakdownText" style="text-align: center; margin-bottom: 5px;"></p>
        <div class="total" id="totalPrice"></div>
        <p style="font-size: 11px; color: #777; margin-top: 15px; text-align: center;">
            *Pricing based on Liliana's Delivery Menu. Excludes tax and delivery ($25 min).
        </p>
    </div>
</div>

<script>
    function toggleTenderloin() {
        const type = document.getElementById('orderType').value;
        document.getElementById('tenderloinRow').style.display = (type === 'box') ? 'flex' : 'none';
    }

    function getQuote() {
        const type = document.getElementById('orderType').value;
        const guests = parseInt(document.getElementById('guestCount').value);
        const hasTenderloin = document.getElementById('tenderloin').checked;
        const hasCannoli = document.getElementById('cannolis').checked;
        
        let basePrice = 0;
        if (type === 'bundle1') basePrice = 15;
        if (type === 'bundle2') basePrice = 18;
        if (type === 'bundle3') basePrice = 21;
        if (type === 'box') basePrice = 15;

        // Apply Liliana's specific upgrades
        if (type === 'box' && hasTenderloin) basePrice += 3;
        if (hasCannoli) basePrice += 2.50;

        const finalTotal = basePrice * guests;

        document.getElementById('breakdownText').innerText = guests + " guests @ $" + basePrice.toFixed(2) + " each";
        document.getElementById('totalPrice').innerText = "$" + finalTotal.toFixed(2);
        document.getElementById('quoteBox').style.display = 'block';
    }
</script>

</body>
</html>
