<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liliana's Catering Assistant</title>
    <style>
        :root { --liliana-red: #a61e22; --liliana-green: #2e7d32; }
        body { font-family: 'Helvetica Neue', sans-serif; background: #fdfdfd; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); overflow: hidden; border-top: 12px solid var(--liliana-red); }
        
        /* Brand Header */
        .brand-header { text-align: center; padding: 40px 20px; background: white; }
        .logo { max-width: 280px; height: auto; margin-bottom: 10px; }
        
        .menu-section { padding: 30px; border-bottom: 1px solid #eee; }
        .section-title { color: var(--liliana-red); font-size: 24px; border-bottom: 2px solid var(--liliana-red); display: inline-block; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Grid for Food Photos */
        .item-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 600px) { .item-grid { grid-template-columns: 1fr; } }
        
        .food-card { border: 1px solid #eee; border-radius: 12px; padding: 15px; display: flex; flex-direction: column; transition: 0.3s; }
        .food-card:hover { border-color: var(--liliana-red); }
        .food-img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; background: #f0f0f0; }
        
        .item-name { font-weight: bold; font-size: 18px; margin-bottom: 5px; }
        .item-desc { font-size: 13px; color: #666; margin-bottom: 10px; flex-grow: 1; }
        .price-tag { color: var(--liliana-red); font-weight: bold; margin-bottom: 10px; font-size: 16px; }
        
        .qty-input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; text-align: center; font-size: 16px; }
        
        /* Bundle Selector Style */
        .bundle-box { background: #fff8f8; padding: 20px; border-radius: 12px; border: 1px solid #f2d7d7; margin-bottom: 20px; }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #ddd; font-size: 16px; margin-top: 10px; }

        .sticky-footer { position: sticky; bottom: 0; background: white; border-top: 4px solid var(--liliana-green); padding: 20px; text-align: center; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); }
        .total-amount { font-size: 36px; font-weight: bold; color: var(--liliana-red); margin-bottom: 10px; }
        .btn-order { background: var(--liliana-green); color: white; border: none; padding: 15px 50px; border-radius: 50px; font-size: 20px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-order:hover { background: #1b5e20; transform: scale(1.02); }
    </style>
</head>
<body>

<div class="container">
    <div class="brand-header">
        <img src="https://raw.githubusercontent.com/TheGivingGreen/lilianas-catering/main/Lilnnas%20logoi.jpg" alt="Liliana's Italian Kitchen" class="logo">
        <p style="font-style: italic; color: #555;">Delivery & Pick-Up Catering Menu Calculator</p>
    </div>

    <div class="menu-section">
        <h2 class="section-title">1. Select a Bundle</h2>
        <div class="bundle-box">
            <label style="font-weight: bold;">Choose your catering package (Min. 10 People):</label>
            <select id="bundleType" onchange="calculate()">
                <option value="0">No Bundle (A La Carte Only)</option>
                <option value="15">Bundle 1 ($15.00/pp) - Sandwich OR Pizza</option>
                <option value="18">Bundle 2 ($18.00/pp) - Sandwich AND Pizza</option>
                <option value="21">Bundle 3 ($21.00/pp) - Sandwich, Pizza, AND Pasta</option>
                <option value="15">Box Lunch ($15.00/ea)</option>
            </select>
            <div style="margin-top: 15px;">
                <label style="font-weight: bold;">Number of Guests:</label>
                <input type="number" id="guestCount" class="qty-input" value="0" min="0" onchange="calculate()" style="width: 100px; display: inline-block; margin-left: 10px;">
            </div>
        </div>
    </div>

    <div class="menu-section">
        <h2 class="section-title">2. Sandwiches & Trays</h2>
        <div class="item-grid" id="sandwiches-list"></div>
    </div>

    <div class="menu-section">
        <h2 class="section-title">3. Appetizers</h2>
        <div class="item-grid" id="apps-list"></div>
    </div>

    <div class="menu-section">
        <h2 class="section-title">4. Salads & Sides</h2>
        <div class="item-grid" id="salads-list"></div>
    </div>

    <div class="menu-section">
        <h2 class="section-title">5. Pasta & Entrées</h2>
        <div class="item-grid" id="pasta-list"></div>
    </div>

    <div class="menu-section">
        <h2 class="section-title">6. Desserts & Drinks</h2>
        <div class="item-grid" id="extras-list"></div>
    </div>

    <div class="sticky-footer">
        <div class="total-amount" id="display-total">$0.00</div>
        <button class="btn-order" onclick="requestQuote()">Email This Quote</button>
        <div style="font-size: 11px; color: #888; margin-top: 10px;">*Excludes tax and $25 min delivery fee. Packages serve 25 unless noted.</div>
    </div>
</div>
